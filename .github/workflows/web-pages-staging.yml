name: Web - Deploy to GitHub Pages (staging)

on:
  workflow_dispatch:
  push:
    branches:
      - staging
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - 'config/**'
      - 'packages/web/**'
      - 'packages/ui/**'
      - 'packages/utils/**'
      - 'packages/schemas/**'
      - 'packages/generator/**'
      - 'packages/db/**'
      - '.github/workflows/web-pages-staging.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-staging
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Uses root package.json#packageManager
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        env:
          CI: true
        run: pnpm -r install --frozen-lockfile

      - name: Build web
        env:
          # GitHub Pages project site path is /<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm --filter @minimal-rpg/web build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
