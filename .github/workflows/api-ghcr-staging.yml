name: API - Build & Push Image (staging)

on:
  workflow_dispatch:
  push:
    branches:
      - staging
    paths:
      - 'config/docker/Dockerfile.api'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - 'config/**'
      - 'packages/api/**'
      - 'packages/agents/**'
      - 'packages/db/**'
      - 'packages/governor/**'
      - 'packages/retrieval/**'
      - 'packages/schemas/**'
      - 'packages/state-manager/**'
      - 'packages/utils/**'
      - '.github/workflows/api-ghcr-staging.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: api-ghcr-staging
  cancel-in-progress: true

jobs:
  build-and-push:
    if: ${{ !contains(github.event.head_commit.message, '[skip api]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:staging
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
